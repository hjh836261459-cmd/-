<!doctype html>
<html lang="zh-CN">
<head>

  <title>AI影像作品馆</title>

  <style>
    :root{--bg:#0b090d;--panel:rgba(22,19,24,.78);--text:#f7efe6;--muted:rgba(247,239,230,.68);--line:rgba(247,239,230,.16);--cyan:#57d6c8;--coral:#ff735c;--gold:#e6c77c;--ink:#0b090d;--r:8px}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;line-height:1.5}a{color:inherit;text-decoration:none}button,input,select{font:inherit}button{cursor:pointer}.top{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:22px;padding:14px clamp(18px,4vw,56px);border-bottom:1px solid var(--line);background:rgba(11,9,13,.76);backdrop-filter:blur(18px)}.brand{display:flex;align-items:center;gap:12px;border:0;background:transparent;color:var(--text);padding:0;text-align:left}.logo{width:48px;height:48px}.brand strong,.brand small{display:block}.brand small,.nav{color:var(--muted);font-size:13px}.nav{display:flex;gap:22px;margin-left:auto}.auth{display:flex;gap:8px}.auth input{width:170px;min-height:38px;border:1px solid var(--line);border-radius:var(--r);background:rgba(247,239,230,.07);color:var(--text);padding:8px 10px}.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:42px;border:1px solid var(--line);border-radius:var(--r);padding:0 14px;background:rgba(247,239,230,.07);color:var(--text);font-weight:800}.btn.primary{border:0;background:var(--text);color:var(--ink)}.btn:hover{border-color:var(--cyan);transform:translateY(-1px)}.hero{position:relative;display:grid;grid-template-columns:minmax(0,1fr) minmax(300px,480px);gap:clamp(28px,5vw,72px);align-items:center;min-height:min(780px,86svh);padding:clamp(64px,9vw,118px) clamp(18px,5vw,72px);overflow:hidden}.hero:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 72% 18%,rgba(87,214,200,.25),transparent 28%),radial-gradient(circle at 28% 78%,rgba(255,115,92,.18),transparent 26%),linear-gradient(90deg,rgba(11,9,13,.96),rgba(11,9,13,.48),rgba(11,9,13,.9))}.hero:after{content:"";position:absolute;inset:9% 6%;border:1px solid rgba(247,239,230,.12);background:linear-gradient(115deg,rgba(247,239,230,.12),rgba(247,239,230,.02) 28%,transparent 29%),repeating-linear-gradient(90deg,rgba(247,239,230,.045) 0 1px,transparent 1px 82px);transform:perspective(900px) rotateY(-8deg);filter:drop-shadow(0 30px 80px rgba(0,0,0,.45))}.hero>*{position:relative;z-index:1}.k{margin:0 0 12px;color:var(--cyan);font-size:12px;font-weight:900;letter-spacing:.16em;text-transform:uppercase}.hero h1{max-width:11ch;margin:0;font-size:clamp(56px,9vw,120px);line-height:.92}.lede{max-width:660px;margin:24px 0 0;color:rgba(247,239,230,.82);font-size:clamp(17px,2vw,22px)}.actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:28px}.spot{min-height:430px;border:1px solid var(--line);border-radius:var(--r);background:var(--panel);box-shadow:0 22px 70px rgba(0,0,0,.46);overflow:hidden;backdrop-filter:blur(18px)}.poster{position:relative;display:grid;place-items:center;aspect-ratio:16/10;overflow:hidden;background:linear-gradient(135deg,#1b171e,#083832 58%,#3b1714)}.spot .poster{min-height:270px}.poster:before{content:"";position:absolute;inset:14%;border:1px solid rgba(247,239,230,.18);background:linear-gradient(140deg,rgba(247,239,230,.16),transparent 42%);transform:skew(-8deg)}.poster img,.poster video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}.play{position:absolute;right:14px;bottom:14px;z-index:1;display:grid;width:46px;height:46px;place-items:center;border:0;border-radius:50%;background:rgba(247,239,230,.92);color:#0b090d;font-weight:900}.spot-body,.card-body{padding:20px}.spot h2,.card h3{margin:0;font-size:clamp(24px,3vw,36px);line-height:1.05}.spot p,.card p{color:var(--muted)}.feature{display:inline-flex;align-items:center;gap:8px;margin-bottom:14px;color:var(--gold);font-size:12px;font-weight:900}.bar,.contact{display:flex;align-items:end;justify-content:space-between;gap:18px;padding:44px clamp(18px,5vw,72px) 24px}.bar h2,.contact h2{margin:0;font-size:clamp(30px,4vw,48px)}.tools{display:flex;flex-wrap:wrap;gap:8px}.tools button,.tools select{min-height:40px;border:1px solid var(--line);border-radius:var(--r);background:rgba(247,239,230,.06);color:var(--text);padding:0 12px}.tools button.on{border-color:var(--cyan);background:rgba(87,214,200,.13)}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px;padding:0 clamp(18px,5vw,72px) 70px}.card{border:1px solid var(--line);border-radius:var(--r);overflow:hidden;background:linear-gradient(180deg,rgba(247,239,230,.08),rgba(247,239,230,.035));box-shadow:0 14px 42px rgba(0,0,0,.26)}.meta{display:flex;justify-content:space-between;gap:12px;color:var(--muted);font-size:12px;font-weight:800}.making-mini{padding-left:12px;border-left:2px solid rgba(87,214,200,.45);font-size:13px}.tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.tag{border:1px solid var(--line);border-radius:999px;padding:5px 9px;color:var(--muted);font-size:12px}.link{border:0;background:transparent;color:var(--cyan);font-weight:900;padding:0}.contact{align-items:flex-start;border-top:1px solid var(--line);padding-bottom:86px;background:linear-gradient(180deg,rgba(247,239,230,.045),transparent)}.contact p{max-width:680px;color:var(--muted);font-size:17px}.contact-list{display:grid;gap:10px;min-width:min(420px,100%)}.contact-list a,.contact-list span{border:1px solid var(--line);border-radius:var(--r);padding:12px 14px;background:rgba(247,239,230,.05);color:var(--text)}.modal[hidden],.hidden{display:none!important}.modal{position:fixed;inset:0;z-index:50;display:grid;place-items:center;padding:24px;background:rgba(0,0,0,.72);backdrop-filter:blur(16px)}.panel{display:grid;grid-template-columns:minmax(0,1.2fr) minmax(320px,.8fr);width:min(1220px,100%);max-height:calc(100svh - 48px);overflow:hidden;border:1px solid var(--line);border-radius:var(--r);background:#111014}.media{min-height:380px;background:#050505}.media video,.media img{width:100%;height:100%;object-fit:contain}.info{padding:32px;overflow:auto}.info h2{margin:0;font-size:clamp(30px,4vw,54px);line-height:1.02}.detail{display:grid;grid-template-columns:auto 1fr;gap:8px 14px;margin:18px 0;color:var(--muted)}.detail dt{color:rgba(247,239,230,.48)}.qr{display:grid;grid-template-columns:112px 1fr;gap:14px;align-items:center;margin-top:22px;padding:12px;border:1px solid var(--line);border-radius:var(--r);background:rgba(247,239,230,.05)}.qr img{width:112px;height:112px;border-radius:6px;background:#fff}.close{position:absolute;right:28px;top:28px;z-index:2}.toast{position:fixed;right:18px;bottom:18px;z-index:80;max-width:360px;padding:12px 14px;border:1px solid var(--line);border-radius:var(--r);background:rgba(11,9,13,.9)}@media(max-width:900px){.hero,.panel,.contact{grid-template-columns:1fr}.grid{grid-template-columns:repeat(2,1fr)}.contact{display:grid}}@media(max-width:660px){.top{align-items:flex-start;flex-direction:column}.nav,.auth{width:100%}.auth input{width:100%;flex:1}.bar{align-items:stretch;flex-direction:column}.grid{grid-template-columns:1fr}.hero h1{font-size:clamp(48px,17vw,72px)}.qr{grid-template-columns:1fr}.qr img{width:140px;height:140px}}
  </style>
</head>
<body>
<header class="top"><button class="brand" id="logoTap" title="AI影像作品馆"><svg class="logo" viewBox="0 0 100 100" aria-hidden="true"><defs><linearGradient id="g" x1="15" y1="10" x2="86" y2="90"><stop stop-color="#57d6c8"/><stop offset=".55" stop-color="#f7efe6"/><stop offset="1" stop-color="#ff735c"/></linearGradient></defs><rect x="7" y="7" width="86" height="86" rx="18" fill="#121016" stroke="rgba(247,239,230,.22)"/><path d="M22 58C36 18 74 18 82 47c-17-15-36-10-48 10 21-7 35 0 43 19-18-13-39-12-55-18Z" fill="none" stroke="url(#g)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/><circle cx="52" cy="50" r="13" fill="none" stroke="#57d6c8" stroke-width="5"/><circle cx="73" cy="31" r="4" fill="#e6c77c"/></svg><span><strong>AI影像作品馆</strong><small>Moving Image Archive</small></span></button><nav class="nav"><a href="#works">作品</a><a href="#contact">合作联系</a><a id="adminNav" class="hidden" href="admin.html">后台</a></nav><form class="auth hidden" id="authForm"><input id="pwd" type="password" placeholder="管理员密码" autocomplete="current-password"><button class="btn" id="loginBtn">进入后台</button><button class="btn hidden" id="logoutBtn" type="button">退出</button></form></header>
<main><section class="hero"><div><p class="k">AI VIDEO SHOWCASE</p><h1>AI影像作品馆</h1><p class="lede">以电影级视觉、清晰的作品叙事和可分享的观看链接，呈现你的 AI 视频创作、制作方法和合作入口。</p><div class="actions"><a class="btn primary" href="#works">▶ 浏览作品</a><a class="btn" href="#contact">合作联系</a><a class="btn hidden" id="uploadBtn" href="admin.html">＋ 上传作品</a></div></div><aside class="spot" id="spot"></aside></section><section class="bar"><div><p class="k">COLLECTION</p><h2>作品</h2></div><div class="tools"><span id="filters"></span><select id="sort"><option value="featured">精选优先</option><option value="newest">最新发布</option><option value="title">标题排序</option></select></div></section><section id="works" class="grid"></section><section class="contact" id="contact"><div><p class="k">CONTACT</p><h2>合作联系</h2><p>如果你想做 AI 广告片、音乐视觉、角色概念、短片测试或品牌视觉提案，可以直接用下面的方式联系我。每个作品详情里也有独立二维码，适合转发给客户或朋友。</p></div><div class="contact-list" id="contactList"></div></section></main>
<div class="modal" id="modal" hidden><button class="btn close" id="close">×</button><article class="panel"><div class="media" id="media"></div><div class="info"><p class="k" id="mcat"></p><h2 id="mtitle"></h2><p id="mdesc"></p><dl class="detail" id="detail"></dl><div class="tags" id="mtags"></div><div class="qr"><img id="qr" alt="作品二维码"><div><strong>扫码分享这个作品</strong><p style="color:var(--muted);margin:.4em 0 0">也可以复制独立链接发送给别人。</p><p><button class="btn primary" id="copy">↗ 复制链接</button></p></div></div></div></article></div><div class="toast hidden" id="toast"></div>
<script>
const HASH="743392a6cfca212568fbd1ca6b693f91f583f67672f2698b000dc20e062ddf6e",KEY="ai-video-gallery.admin-session";let works=[],site={},filter="全部",active=null,taps=0;const $=s=>document.querySelector(s),demo=[{slug:"neon-archive",title:"Neon Archive",category:"概念短片",year:"2026",duration:"00:36",tags:["AI Video","Cinematic"],description:"上传你的真实视频后，可以在后台替换这个示例作品。",making:"记录镜头设计、提示词思路和后期处理方式。",model:"Runway / Kling / Pika",role:"导演、Prompt、剪辑",featured:true,createdAt:"2026-05-09T00:00:00.000Z"}];init();async function init(){authState();try{let r=await fetch("works.json?v="+Date.now(),{cache:"no-store"});let d=await r.json();works=d.works||demo;site=d.site||{}}catch{works=demo;site={}}render();renderContact();let q=new URLSearchParams(location.search).get("work");if(q)openWork(q)}async function sha(v){let b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(v.trim()));return[...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,"0")).join("")}function authed(){return sessionStorage.getItem(KEY)==="true"}function authState(){let ok=authed();["#adminNav","#uploadBtn","#logoutBtn"].forEach(s=>$(s).classList.toggle("hidden",!ok));$("#authForm").classList.toggle("hidden",!ok&&taps<5);$("#pwd").classList.toggle("hidden",ok);$("#loginBtn").classList.toggle("hidden",ok)}$("#logoTap").onclick=()=>{taps++;if(taps===5){authState();toast("管理员入口已打开")}};$("#authForm").onsubmit=async e=>{e.preventDefault();if(await sha($("#pwd").value)===HASH){sessionStorage.setItem(KEY,"true");location.href="admin.html"}else toast("密码不正确")};$("#logoutBtn").onclick=()=>{sessionStorage.removeItem(KEY);taps=0;authState();toast("已退出管理员模式")};$("#sort").onchange=render;function render(){let cats=["全部",...new Set(works.map(w=>w.category||"作品"))];$("#filters").innerHTML=cats.map(c=>`<button class="${c===filter?'on':''}" onclick="filter='${esc(c)}';render()">${esc(c)}</button>`).join("");let list=(filter==="全部"?works:works.filter(w=>w.category===filter)).sort((a,b)=>$("#sort").value==="title"?a.title.localeCompare(b.title,"zh-CN"):$("#sort").value==="newest"?Date.parse(b.createdAt||0)-Date.parse(a.createdAt||0):Number(b.featured)-Number(a.featured)||Date.parse(b.createdAt||0)-Date.parse(a.createdAt||0));let first=works.find(w=>w.featured)||works[0];$("#spot").innerHTML=first?`${poster(first)}<div class="spot-body"><span class="feature">★ 精选作品</span><p class="k">${esc(first.category||"作品")}</p><h2>${esc(first.title)}</h2><p>${esc(first.description||"")}</p><p class="making-mini">${esc(first.making||first.prompt||"")}</p></div>`:"";$("#works").innerHTML=list.map(w=>`<article class="card">${poster(w)}<div class="card-body"><div class="meta"><span>${esc(w.category||"作品")}</span><span>${esc([w.year,w.duration].filter(Boolean).join(" · "))}</span></div><h3>${esc(w.title)}</h3><p>${esc(w.description||"")}</p><p class="making-mini">${esc(w.model||"AI Video")}${w.role?" · "+esc(w.role):""}</p><div class="tags">${(w.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join("")}</div><p><button class="link" onclick="openWork('${esc(w.slug)}')">${w.videoUrl?'观看':'查看'}</button> · <button class="link" onclick="copyLink('${esc(w.slug)}')">分享</button></p></div></article>`).join("")}function poster(w){let img=w.poster?`<img src="${esc(url(w.poster))}" alt="${esc(w.title)}">`:"";return`<div class="poster">${img}<button class="play" onclick="openWork('${esc(w.slug)}')">${w.videoUrl?'▶':'＋'}</button></div>`}function renderContact(){let c=site.contact||{};let items=[['邮箱',c.email&&`mailto:${c.email}`,c.email],['微信',null,c.wechat],['小红书',c.xiaohongshu,c.xiaohongshu],['B站',c.bilibili,c.bilibili]].filter(x=>x[2]);$("#contactList").innerHTML=items.length?items.map(([k,href,v])=>href&&/^https?:|^mailto:/.test(href)?`<a href="${esc(href)}" target="_blank" rel="noreferrer"><strong>${esc(k)}</strong> · ${esc(v)}</a>`:`<span><strong>${esc(k)}</strong> · ${esc(v)}</span>`).join(""):"<span>在后台或 works.json 里填写邮箱、微信、小红书、B 站链接。</span>"}function openWork(slug){let w=works.find(x=>x.slug===slug);if(!w)return;active=w;let share=shareUrl(slug);$("#mtitle").textContent=w.title;$("#mcat").textContent=w.category||"作品";$("#mdesc").textContent=w.description||"";$("#detail").innerHTML=rows([['年份',w.year],['时长',w.duration],['模型/工具',w.model],['项目角色',w.role],['创作说明',w.making],['Prompt',w.prompt]]);$("#mtags").innerHTML=(w.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join("");$("#media").innerHTML=w.videoUrl?`<video src="${esc(url(w.videoUrl))}" poster="${esc(url(w.poster||""))}" controls autoplay playsinline></video>`:(w.poster?`<img src="${esc(url(w.poster))}" alt="${esc(w.title)}">`:`<div class="poster"></div>`);$("#qr").src="https://api.qrserver.com/v1/create-qr-code/?size=164x164&margin=8&data="+encodeURIComponent(share);$("#modal").hidden=false;let u=new URL(location.href);u.searchParams.set("work",slug);history.replaceState({},"",u)}function rows(a){return a.filter(x=>x[1]).map(([k,v])=>`<dt>${esc(k)}</dt><dd>${esc(v)}</dd>`).join("")}$("#close").onclick=()=>{$("#modal").hidden=true;$("#media").innerHTML="";let u=new URL(location.href);u.searchParams.delete("work");history.replaceState({},"",u)};$("#copy").onclick=()=>active&&copyLink(active.slug);function shareUrl(slug){let u=new URL(location.href);u.searchParams.set("work",slug);u.hash="";return u.toString()}async function copyLink(slug){try{await navigator.clipboard.writeText(shareUrl(slug));toast("作品链接已复制")}catch{toast(shareUrl(slug))}}function toast(t){$("#toast").textContent=t;$("#toast").classList.remove("hidden");setTimeout(()=>$("#toast").classList.add("hidden"),2600)}function url(p){return /^(https?:|blob:|data:)/i.test(p||"")?p:p.replace(/^\.?\//,"")}function esc(v){return String(v??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]))}
</script>
</body>
</html>
