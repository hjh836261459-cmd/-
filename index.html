<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AI影像作品馆</title>
  <meta name="description" content="AI 视频作品展示网站">
  <style>
    :root{--bg:#0b090d;--panel:rgba(22,19,24,.76);--text:#f7efe6;--muted:rgba(247,239,230,.68);--line:rgba(247,239,230,.16);--cyan:#57d6c8;--coral:#ff735c;--ink:#0b090d;--r:8px}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif}a{color:inherit;text-decoration:none}button,input,select{font:inherit}button{cursor:pointer}.top{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:22px;padding:14px clamp(18px,4vw,56px);border-bottom:1px solid var(--line);background:rgba(11,9,13,.76);backdrop-filter:blur(18px)}.brand{display:flex;align-items:center;gap:12px}.mark{display:grid;width:42px;height:42px;place-items:center;border:1px solid rgba(87,214,200,.58);border-radius:var(--r);color:var(--cyan);font-weight:900;background:rgba(87,214,200,.08)}.brand strong,.brand small{display:block}.brand small,.nav{color:var(--muted);font-size:13px}.nav{display:flex;gap:22px;margin-left:auto}.auth{display:flex;gap:8px}.auth input{width:160px;min-height:38px;border:1px solid var(--line);border-radius:var(--r);background:rgba(247,239,230,.07);color:var(--text);padding:8px 10px}.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:42px;border:1px solid var(--line);border-radius:var(--r);padding:0 14px;background:rgba(247,239,230,.07);color:var(--text);font-weight:800}.btn.primary{border:0;background:var(--text);color:var(--ink)}.btn:hover{border-color:var(--cyan);transform:translateY(-1px)}.hero{position:relative;display:grid;grid-template-columns:minmax(0,1fr) minmax(300px,460px);gap:clamp(28px,5vw,72px);align-items:center;min-height:min(780px,86svh);padding:clamp(64px,9vw,118px) clamp(18px,5vw,72px);overflow:hidden}.hero:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 70% 25%,rgba(87,214,200,.24),transparent 27%),radial-gradient(circle at 30% 75%,rgba(255,115,92,.18),transparent 25%),linear-gradient(90deg,rgba(11,9,13,.96),rgba(11,9,13,.48),rgba(11,9,13,.88));}.hero:after{content:"";position:absolute;inset:9% 6%;border:1px solid rgba(247,239,230,.12);background:linear-gradient(115deg,rgba(247,239,230,.12),rgba(247,239,230,.02) 28%,transparent 29%),repeating-linear-gradient(90deg,rgba(247,239,230,.045) 0 1px,transparent 1px 82px);transform:perspective(900px) rotateY(-8deg);filter:drop-shadow(0 30px 80px rgba(0,0,0,.45))}.hero>*{position:relative;z-index:1}.k{margin:0 0 12px;color:var(--cyan);font-size:12px;font-weight:900;letter-spacing:.16em}.hero h1{max-width:11ch;margin:0;font-size:clamp(56px,9vw,120px);line-height:.92}.lede{max-width:640px;margin:24px 0 0;color:rgba(247,239,230,.82);font-size:clamp(17px,2vw,22px)}.actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:28px}.spot{min-height:430px;border:1px solid var(--line);border-radius:var(--r);background:var(--panel);box-shadow:0 22px 70px rgba(0,0,0,.46);overflow:hidden;backdrop-filter:blur(18px)}.spot .poster{min-height:270px}.poster{position:relative;display:grid;place-items:center;aspect-ratio:16/10;overflow:hidden;background:linear-gradient(135deg,#1b171e,#083832 58%,#3b1714)}.poster:before{content:"";position:absolute;inset:14%;border:1px solid rgba(247,239,230,.18);background:linear-gradient(140deg,rgba(247,239,230,.16),transparent 42%);transform:skew(-8deg)}.poster img,.poster video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}.play{position:absolute;right:14px;bottom:14px;z-index:1;display:grid;width:46px;height:46px;place-items:center;border:0;border-radius:50%;background:rgba(247,239,230,.92);color:#0b090d;font-weight:900}.spot-body,.card-body{padding:20px}.spot h2,.card h3{margin:0;font-size:clamp(24px,3vw,36px);line-height:1.05}.spot p,.card p{color:var(--muted)}.bar{display:flex;align-items:end;justify-content:space-between;gap:18px;padding:44px clamp(18px,5vw,72px) 24px}.bar h2{margin:0;font-size:clamp(30px,4vw,48px)}.tools{display:flex;flex-wrap:wrap;gap:8px}.tools button,.tools select{min-height:40px;border:1px solid var(--line);border-radius:var(--r);background:rgba(247,239,230,.06);color:var(--text);padding:0 12px}.tools button.on{border-color:var(--cyan);background:rgba(87,214,200,.13)}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px;padding:0 clamp(18px,5vw,72px) 80px}.card{border:1px solid var(--line);border-radius:var(--r);overflow:hidden;background:linear-gradient(180deg,rgba(247,239,230,.08),rgba(247,239,230,.035));box-shadow:0 14px 42px rgba(0,0,0,.26)}.meta{display:flex;justify-content:space-between;gap:12px;color:var(--muted);font-size:12px;font-weight:800}.tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.tag{border:1px solid var(--line);border-radius:999px;padding:5px 9px;color:var(--muted);font-size:12px}.link{border:0;background:transparent;color:var(--cyan);font-weight:900;padding:0}.modal[hidden],.hidden{display:none!important}.modal{position:fixed;inset:0;z-index:50;display:grid;place-items:center;padding:24px;background:rgba(0,0,0,.72);backdrop-filter:blur(16px)}.panel{display:grid;grid-template-columns:minmax(0,1.25fr) minmax(300px,.75fr);width:min(1180px,100%);max-height:calc(100svh - 48px);overflow:hidden;border:1px solid var(--line);border-radius:var(--r);background:#111014}.media{min-height:360px;background:#050505}.media video,.media img{width:100%;height:100%;object-fit:contain}.info{padding:32px;overflow:auto}.close{position:absolute;right:28px;top:28px;z-index:2}.toast{position:fixed;right:18px;bottom:18px;z-index:80;max-width:360px;padding:12px 14px;border:1px solid var(--line);border-radius:var(--r);background:rgba(11,9,13,.9)}@media(max-width:900px){.hero,.panel{grid-template-columns:1fr}.grid{grid-template-columns:repeat(2,1fr)}}@media(max-width:660px){.top{align-items:flex-start;flex-direction:column}.nav,.auth{width:100%}.auth input{width:100%;flex:1}.bar{align-items:stretch;flex-direction:column}.grid{grid-template-columns:1fr}.hero h1{font-size:clamp(48px,17vw,72px)}}
  </style>
</head>
<body>
<header class="top"><a class="brand" href="./"><span class="mark">AI</span><span><strong>AI影像作品馆</strong><small>Moving Image Archive</small></span></a><nav class="nav"><a href="#works">作品</a><a href="#curation">策展</a><a id="adminNav" class="hidden" href="admin.html">后台</a></nav><form class="auth" id="authForm"><input id="pwd" type="password" placeholder="管理员密码" autocomplete="current-password"><button class="btn" id="loginBtn">进入后台</button><button class="btn hidden" id="logoutBtn" type="button">退出</button></form></header>
<main><section class="hero"><div><p class="k">AI VIDEO SHOWCASE</p><h1>AI影像作品馆</h1><p class="lede">以电影级视觉、清晰的作品叙事和可分享的观看链接，呈现你的 AI 视频创作。</p><div class="actions"><a class="btn primary" href="#works">▶ 浏览作品</a><a class="btn hidden" id="uploadBtn" href="admin.html">＋ 上传作品</a></div></div><aside class="spot" id="spot"></aside></section><section class="bar"><div><p class="k">COLLECTION</p><h2>作品</h2></div><div class="tools"><span id="filters"></span><select id="sort"><option value="featured">精选优先</option><option value="newest">最新发布</option><option value="title">标题排序</option></select></div></section><section id="works" class="grid"></section><section id="curation" style="border-top:1px solid var(--line);padding:44px clamp(18px,5vw,72px) 80px"><p class="k">CURATION</p><h2 style="font-size:clamp(30px,4vw,48px);margin:0">把每个作品当成一次首映</h2><p class="lede">页面以大幅影像、克制的深色展厅和快速分享为核心。每个作品都可以生成独立链接。</p></section></main>
<div class="modal" id="modal" hidden><button class="btn close" id="close">×</button><article class="panel"><div class="media" id="media"></div><div class="info"><p class="k" id="mcat"></p><h2 id="mtitle"></h2><p id="mdesc"></p><p id="mmeta"></p><div class="tags" id="mtags"></div><p><button class="btn primary" id="copy">↗ 复制链接</button></p></div></article></div><div class="toast hidden" id="toast"></div>
<script>
const HASH="743392a6cfca212568fbd1ca6b693f91f583f67672f2698b000dc20e062ddf6e",KEY="ai-video-gallery.admin-session";let works=[],filter="全部",active=null;const $=s=>document.querySelector(s),demo=[{slug:"neon-archive",title:"Neon Archive",category:"概念短片",year:"2026",duration:"00:36",tags:["AI Video","Cinematic"],description:"上传你的真实视频后，可以在后台替换这个示例作品。",featured:true,createdAt:"2026-05-09T00:00:00.000Z"},{slug:"synthetic-dreams",title:"Synthetic Dreams",category:"实验影像",year:"2026",duration:"01:12",tags:["Motion","Generative"],description:"用来展示排版和筛选效果的示例条目。",featured:false,createdAt:"2026-05-08T00:00:00.000Z"}];init();async function init(){authState();try{let r=await fetch("works.json?v="+Date.now(),{cache:"no-store"});works=(await r.json()).works||demo}catch{works=demo}render();let q=new URLSearchParams(location.search).get("work");if(q)openWork(q)}async function sha(v){let b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(v.trim()));return[...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,"0")).join("")}function authed(){return sessionStorage.getItem(KEY)==="true"}function authState(){let ok=authed();["#adminNav","#uploadBtn","#logoutBtn"].forEach(s=>$(s).classList.toggle("hidden",!ok));$("#pwd").classList.toggle("hidden",ok);$("#loginBtn").classList.toggle("hidden",ok)}$("#authForm").onsubmit=async e=>{e.preventDefault();if(await sha($("#pwd").value)===HASH){sessionStorage.setItem(KEY,"true");location.href="admin.html"}else toast("密码不正确")};$("#logoutBtn").onclick=()=>{sessionStorage.removeItem(KEY);authState();toast("已退出管理员模式")};$("#sort").onchange=render;function render(){let cats=["全部",...new Set(works.map(w=>w.category||"作品"))];$("#filters").innerHTML=cats.map(c=>`<button class="${c===filter?'on':''}" onclick="filter='${esc(c)}';render()">${esc(c)}</button>`).join("");let list=(filter==="全部"?works:works.filter(w=>w.category===filter)).sort((a,b)=>$("#sort").value==="title"?a.title.localeCompare(b.title,"zh-CN"):$("#sort").value==="newest"?Date.parse(b.createdAt||0)-Date.parse(a.createdAt||0):Number(b.featured)-Number(a.featured)||Date.parse(b.createdAt||0)-Date.parse(a.createdAt||0));let first=works.find(w=>w.featured)||works[0];$("#spot").innerHTML=first?`${poster(first,"spot") }<div class="spot-body"><p class="k">${esc(first.category||"作品")}</p><h2>${esc(first.title)}</h2><p>${esc(first.description||"")}</p></div>`:"";$("#works").innerHTML=list.map(w=>`<article class="card">${poster(w)}<div class="card-body"><div class="meta"><span>${esc(w.category||"作品")}</span><span>${esc([w.year,w.duration].filter(Boolean).join(" · "))}</span></div><h3>${esc(w.title)}</h3><p>${esc(w.description||"")}</p><div class="tags">${(w.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join("")}</div><p><button class="link" onclick="openWork('${esc(w.slug)}')">${w.videoUrl?'观看':'查看'}</button> · <button class="link" onclick="copyLink('${esc(w.slug)}')">分享</button></p></div></article>`).join("")}function poster(w){let img=w.poster?`<img src="${esc(url(w.poster))}" alt="${esc(w.title)}">`:"";return`<div class="poster">${img}<button class="play" onclick="openWork('${esc(w.slug)}')">${w.videoUrl?'▶':'＋'}</button></div>`}function openWork(slug){let w=works.find(x=>x.slug===slug);if(!w)return;active=w;$("#mtitle").textContent=w.title;$("#mcat").textContent=w.category||"作品";$("#mdesc").textContent=w.description||w.prompt||"";$("#mmeta").textContent=[w.year,w.duration].filter(Boolean).join(" · ");$("#mtags").innerHTML=(w.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join("");$("#media").innerHTML=w.videoUrl?`<video src="${esc(url(w.videoUrl))}" poster="${esc(url(w.poster||""))}" controls autoplay playsinline></video>`:(w.poster?`<img src="${esc(url(w.poster))}" alt="${esc(w.title)}">`:`<div class="poster"></div>`);$("#modal").hidden=false;let u=new URL(location.href);u.searchParams.set("work",slug);history.replaceState({},"",u)}$("#close").onclick=()=>{$("#modal").hidden=true;$("#media").innerHTML="";let u=new URL(location.href);u.searchParams.delete("work");history.replaceState({},"",u)};$("#copy").onclick=()=>active&&copyLink(active.slug);async function copyLink(slug){let u=new URL(location.href);u.searchParams.set("work",slug);await navigator.clipboard.writeText(u);toast("作品链接已复制")}function toast(t){$("#toast").textContent=t;$("#toast").classList.remove("hidden");setTimeout(()=>$("#toast").classList.add("hidden"),2600)}function url(p){return /^(https?:|blob:|data:)/i.test(p||"")?p:p.replace(/^\.?\//,"")}function esc(v){return String(v??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]))}
</script>
</body>
</html>
