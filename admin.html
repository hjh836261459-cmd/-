<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>后台 · AI影像作品馆</title>
  <style>
    :root{--bg:#0b090d;--panel:rgba(22,19,24,.78);--text:#f7efe6;--muted:rgba(247,239,230,.68);--line:rgba(247,239,230,.16);--cyan:#57d6c8;--coral:#ff735c;--ink:#0b090d;--r:8px}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 70% 0,rgba(87,214,200,.16),transparent 34%),var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif}a{color:inherit;text-decoration:none}button,input,textarea,select{font:inherit}button{cursor:pointer}.top{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:20px;padding:14px clamp(18px,4vw,56px);border-bottom:1px solid var(--line);background:rgba(11,9,13,.76);backdrop-filter:blur(18px)}.brand{display:flex;align-items:center;gap:12px}.logo{width:48px;height:48px}.brand small{display:block;color:var(--muted);font-size:13px}.nav{margin-left:auto;display:flex;gap:18px;color:var(--muted)}.auth{display:flex;gap:8px}.auth input{width:180px}.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:42px;border:1px solid var(--line);border-radius:var(--r);padding:0 14px;background:rgba(247,239,230,.07);color:var(--text);font-weight:800}.btn.primary{border:0;background:var(--text);color:var(--ink)}.btn:hover{border-color:var(--cyan);transform:translateY(-1px)}main{display:grid;grid-template-columns:minmax(0,1fr) minmax(320px,.72fr);gap:18px;padding:clamp(18px,4vw,42px)}.panel{border:1px solid var(--line);border-radius:var(--r);background:var(--panel);box-shadow:0 18px 54px rgba(0,0,0,.24);padding:clamp(18px,3vw,28px);backdrop-filter:blur(18px)}.wide{grid-column:1/-1}.head{display:flex;justify-content:space-between;gap:18px;margin-bottom:22px}.k{margin:0 0 12px;color:var(--cyan);font-size:12px;font-weight:900;letter-spacing:.16em}h1,h2{margin:0;font-size:clamp(28px,4vw,46px);line-height:1.05}.grid,.form{display:grid;gap:14px}.settings{grid-template-columns:repeat(4,minmax(0,1fr))}.contact-grid{grid-template-columns:repeat(4,minmax(0,1fr));margin-top:18px;padding-top:18px;border-top:1px solid var(--line)}label{display:grid;gap:7px;color:var(--muted);font-size:13px;font-weight:800}input,textarea,select{width:100%;min-height:44px;border:1px solid var(--line);border-radius:var(--r);background:rgba(247,239,230,.07);color:var(--text);outline:none;padding:10px 12px}textarea{min-height:104px;resize:vertical}.row,.upload{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:14px}.log{min-height:58px;margin:0 0 16px;padding:12px;border:1px solid var(--line);border-radius:var(--r);background:rgba(0,0,0,.18);color:var(--muted);white-space:pre-wrap}.item{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;border:1px solid var(--line);border-radius:var(--r);padding:12px;background:rgba(247,239,230,.05)}.item h3{margin:0;font-size:16px}.item p{margin:3px 0 0;color:var(--muted);font-size:12px}.login{display:grid;min-height:calc(100svh - 72px);place-items:center;padding:clamp(24px,5vw,72px);background:linear-gradient(90deg,rgba(11,9,13,.94),rgba(11,9,13,.58)),radial-gradient(circle at 70% 20%,rgba(87,214,200,.22),transparent 30%)}.login>div{width:min(680px,100%);border:1px solid var(--line);border-radius:var(--r);background:rgba(11,9,13,.72);padding:clamp(24px,5vw,42px);box-shadow:0 22px 70px rgba(0,0,0,.46)}.hidden{display:none!important}.toast{position:fixed;right:18px;bottom:18px;z-index:80;max-width:360px;padding:12px 14px;border:1px solid var(--line);border-radius:var(--r);background:rgba(11,9,13,.9)}@media(max-width:1000px){main,.settings,.contact-grid{grid-template-columns:1fr}.wide{grid-column:auto}}@media(max-width:660px){.top{align-items:flex-start;flex-direction:column}.nav,.auth{width:100%}.auth input{width:100%;flex:1}.row,.upload{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header class="top"><a class="brand" href="./"><svg class="logo" viewBox="0 0 100 100" aria-hidden="true"><defs><linearGradient id="g" x1="15" y1="10" x2="86" y2="90"><stop stop-color="#57d6c8"/><stop offset=".55" stop-color="#f7efe6"/><stop offset="1" stop-color="#ff735c"/></linearGradient></defs><rect x="7" y="7" width="86" height="86" rx="18" fill="#121016" stroke="rgba(247,239,230,.22)"/><path d="M22 58C36 18 74 18 82 47c-17-15-36-10-48 10 21-7 35 0 43 19-18-13-39-12-55-18Z" fill="none" stroke="url(#g)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/><circle cx="52" cy="50" r="13" fill="none" stroke="#57d6c8" stroke-width="5"/><circle cx="73" cy="31" r="4" fill="#e6c77c"/></svg><span><strong>作品后台</strong><small>Publisher</small></span></a><nav class="nav"><a href="./">查看网站</a><a id="publishLink" class="hidden" href="#publish">发布作品</a></nav><form class="auth" id="authForm"><input id="pwd" type="password" placeholder="管理员密码" autocomplete="current-password"><button class="btn" id="loginBtn">进入后台</button><button class="btn hidden" id="logoutBtn" type="button">退出</button></form></header>
<section class="login" id="gate"><div><p class="k">ADMIN MODE</p><h1>输入管理员密码后才能进入后台。</h1><p style="color:var(--muted);font-size:17px">访客打开网站时只能浏览公开视频；发布入口会在管理员模式下显示。</p></div></section>
<main id="app" class="hidden"><section class="panel wide"><div class="head"><div><p class="k">GITHUB PAGES</p><h1>连接仓库与合作信息</h1></div><span id="state" style="color:var(--muted);font-weight:900">未连接</span></div><form class="grid settings"><label>Owner<input id="owner" value="hjh836261459-cmd"></label><label>Repository<input id="repo" value="-"></label><label>Branch<input id="branch" value="gh-pages"></label><label>Token<input id="token" type="password" autocomplete="off" placeholder="Fine-grained token"></label><label>数据文件<input id="dataPath" value="works.json"></label><label>视频目录<input id="videosPath" value="videos"></label><label>封面目录<input id="postersPath" value="posters"></label><label style="display:flex;align-items:center;gap:10px;padding-top:22px"><input id="remember" type="checkbox" style="width:18px;min-height:18px">保存 token</label></form><form class="grid contact-grid"><label>合作邮箱<input id="contactEmail" placeholder="your@email.com"></label><label>微信<input id="contactWechat" placeholder="你的微信号"></label><label>小红书<input id="contactXhs" placeholder="主页链接"></label><label>B站<input id="contactBili" placeholder="主页链接"></label></form><div class="actions"><button class="btn" id="save">✓ 保存设置</button><button class="btn" id="test">◎ 测试连接</button><button class="btn" id="load">↓ 读取作品</button><button class="btn primary" id="saveContact">↑ 更新合作信息</button></div></section><section class="panel" id="publish"><div class="head"><div><p class="k">NEW WORK</p><h2>发布作品</h2></div></div><form class="form"><label>标题<input id="title" required placeholder="例如：城市梦游"></label><label>Slug<input id="slug" placeholder="city-dreamwalk"></label><div class="row"><label>分类<select id="cat"><option>概念短片</option><option>音乐视觉</option><option>广告样片</option><option>角色测试</option><option>实验影像</option></select></label><label>年份<input id="year" value="2026"></label></div><div class="row"><label>时长<input id="duration" placeholder="00:45"></label><label style="display:flex;align-items:center;gap:10px;padding-top:22px"><input id="featured" type="checkbox" style="width:18px;min-height:18px">设为精选</label></div><div class="row"><label>模型/工具<input id="model" placeholder="Runway / Kling / Pika / 剪映"></label><label>项目角色<input id="role" placeholder="导演、Prompt、剪辑、调色"></label></div><label>标签<input id="tags" placeholder="Cinematic, Runway, Prompt Art"></label><label>简介<textarea id="desc" placeholder="作品的一句话介绍和视觉亮点。"></textarea></label><label>创作说明<textarea id="making" placeholder="记录创意、镜头设计、提示词策略、后期处理。"></textarea></label><label>Prompt<textarea id="prompt" placeholder="可选：记录核心提示词。"></textarea></label><div class="upload"><label>上传视频<input id="videoFile" type="file" accept="video/*"></label><label>或视频 URL<input id="videoUrl" placeholder="https://..."></label><label>上传封面<input id="posterFile" type="file" accept="image/*"></label><label>或封面 URL<input id="posterUrl" placeholder="https://..."></label></div><div class="actions"><button class="btn" id="preview" type="button">◐ 本地预览</button><button class="btn primary" id="publishBtn" type="button">↑ 发布到 GitHub</button></div></form></section><section class="panel"><div class="head"><div><p class="k">PREVIEW</p><h2>当前作品</h2></div><button class="btn" id="export" type="button">⤓ 导出 JSON</button></div><div class="log" id="log">准备就绪。</div><div class="grid" id="list"></div></section></main><div class="toast hidden" id="toast"></div>
<script>
const HASH="743392a6cfca212568fbd1ca6b693f91f583f67672f2698b000dc20e062ddf6e",AUTH="ai-video-gallery.admin-session",SET="ai-video-gallery.settings",TOK="ai-video-gallery.github-token",MAX=95*1024*1024;let data={site:{title:"AI影像作品馆",owner:"Your Name",contact:{}},works:[]},drafts=[];const $=s=>document.querySelector(s);boot();async function boot(){authState();if(!authed())return;start()}async function sha(v){let b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(v.trim()));return[...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,"0")).join("")}function authed(){return sessionStorage.getItem(AUTH)==="true"}function authState(){let ok=authed();$("#app").classList.toggle("hidden",!ok);$("#gate").classList.toggle("hidden",ok);$("#publishLink").classList.toggle("hidden",!ok);$("#pwd").classList.toggle("hidden",ok);$("#loginBtn").classList.toggle("hidden",ok);$("#logoutBtn").classList.toggle("hidden",!ok)}$("#authForm").onsubmit=async e=>{e.preventDefault();if(await sha($("#pwd").value)===HASH){sessionStorage.setItem(AUTH,"true");authState();start();toast("管理员模式已开启")}else toast("密码不正确")};$("#logoutBtn").onclick=()=>{sessionStorage.removeItem(AUTH);authState();toast("已退出管理员模式")};let started=false;async function start(){if(started)return;started=true;loadSettings();bind();await loadLocal();fillContact();render()}function bind(){["save","test","load","preview","publishBtn","export","saveContact"].forEach(id=>$("#"+id).onclick=actions[id]);$("#title").oninput=()=>{if(!$("#slug").dataset.touched)$("#slug").value=slug($("#title").value)};$("#slug").oninput=()=>$("#slug").dataset.touched="1"}const actions={save:()=>{saveSettings();toast("设置已保存")},test:async()=>{let s=req();if(!s)return;try{log("正在测试 GitHub 连接...");let r=await gh(s,`/repos/${s.owner}/${s.repo}`);$("#state").textContent="已连接";$("#state").style.color="var(--cyan)";log(`连接成功：${r.full_name}`)}catch(e){log("连接失败："+e.message)}},load:async()=>{let s=req();if(!s)return;try{let remote=await getJson(s,s.dataPath);if(remote){data=remote;fillContact();render();log(`已读取 ${remote.works?.length||0} 个作品。`)}else log("远程 works.json 不存在。") }catch(e){log("读取失败："+e.message)}},saveContact:async()=>{let s=req();if(!s)return;try{saveSettings();let remote=await getJson(s,s.dataPath)||data;data={...remote,site:{...(remote.site||data.site),contact:contactFromForm()}};await putJson(s,s.dataPath,data,"Update gallery contact info");log("合作联系方式已更新。GitHub Pages 通常几十秒后刷新。");toast("合作信息已更新")}catch(e){log("更新失败："+e.message)}},preview:async()=>{try{let w=await collect(true);drafts=upsert(drafts,w);render();toast("已加入本地预览")}catch(e){log(e.message)}},publishBtn:async()=>{let s=req();if(!s)return;try{saveSettings();let w=await collect(false),stamp=new Date().toISOString().replace(/[-:T.Z]/g,"").slice(0,14);let vf=$("#videoFile").files[0],pf=$("#posterFile").files[0];if(vf){if(vf.size>MAX)throw Error("视频超过 95MB，请压缩或使用外部视频 URL。");let p=`${s.videosPath}/${w.slug}-${stamp}.${ext(vf.name,"mp4")}`;log("正在上传视频："+p);await putFile(s,p,await file64(vf),`Add video ${w.title}`);w.videoUrl=p}if(pf){let p=`${s.postersPath}/${w.slug}-${stamp}.${ext(pf.name,"jpg")}`;log("正在上传封面："+p);await putFile(s,p,await file64(pf),`Add poster ${w.title}`);w.poster=p}let remote=await getJson(s,s.dataPath)||data;let old=(remote.works||[]).find(x=>x.slug===w.slug);w={...old,...w,id:old?.id||w.slug,createdAt:old?.createdAt||new Date().toISOString(),updatedAt:new Date().toISOString()};let works=upsert(remote.works||[],w);if(w.featured)works=works.map(x=>({...x,featured:x.slug===w.slug}));data={site:{...(remote.site||data.site),contact:contactFromForm()},works};log("正在更新数据文件："+s.dataPath);await putJson(s,s.dataPath,data,`Publish work ${w.title}`);drafts=upsert(drafts,w);render();log(`发布完成：${w.title}\nGitHub Pages 通常几十秒后更新。`);toast("发布完成")}catch(e){log("发布失败："+e.message)}},export:()=>{let blob=new Blob([JSON.stringify({site:{...data.site,contact:contactFromForm()},works:all().map(clean)},null,2)],{type:"application/json"}),a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="works.json";a.click();URL.revokeObjectURL(a.href)}};async function loadLocal(){try{let r=await fetch("works.json?v="+Date.now(),{cache:"no-store"});if(r.ok)data=await r.json()}catch(e){log("本地数据读取失败："+e.message)}}function loadSettings(){let s=JSON.parse(localStorage.getItem(SET)||"{}");$("#owner").value=s.owner||"hjh836261459-cmd";$("#repo").value=s.repo||"-";$("#branch").value=s.branch||"gh-pages";$("#dataPath").value=s.dataPath||"works.json";$("#videosPath").value=s.videosPath||"videos";$("#postersPath").value=s.postersPath||"posters";$("#remember").checked=!!s.remember;$("#token").value=sessionStorage.getItem(TOK)||localStorage.getItem(TOK)||""}function fillContact(){let c=data.site?.contact||{};$("#contactEmail").value=c.email||"";$("#contactWechat").value=c.wechat||"";$("#contactXhs").value=c.xiaohongshu||"";$("#contactBili").value=c.bilibili||""}function contactFromForm(){return{email:$("#contactEmail").value.trim(),wechat:$("#contactWechat").value.trim(),xiaohongshu:$("#contactXhs").value.trim(),bilibili:$("#contactBili").value.trim()}}function settings(){return{owner:$("#owner").value.trim(),repo:$("#repo").value.trim(),branch:$("#branch").value.trim()||"gh-pages",token:$("#token").value.trim(),dataPath:path($("#dataPath").value||"works.json"),videosPath:path($("#videosPath").value||"videos"),postersPath:path($("#postersPath").value||"posters"),remember:$("#remember").checked}}function saveSettings(){let s=settings();localStorage.setItem(SET,JSON.stringify({owner:s.owner,repo:s.repo,branch:s.branch,dataPath:s.dataPath,videosPath:s.videosPath,postersPath:s.postersPath,remember:s.remember}));if(s.token){(s.remember?localStorage:sessionStorage).setItem(TOK,s.token);(s.remember?sessionStorage:localStorage).removeItem(TOK)}}function req(){let s=settings();if(!s.owner||!s.repo||!s.token){log("请填写 GitHub Owner、Repository 和 Token。");return null}return s}async function collect(local){let title=$("#title").value.trim();if(!title)throw Error("请先填写作品标题。");let sl=slug($("#slug").value||title),vf=$("#videoFile").files[0],pf=$("#posterFile").files[0],vu=$("#videoUrl").value.trim(),pu=$("#posterUrl").value.trim();if(!local&&!vf&&!vu)throw Error("请上传视频文件，或填写可公开访问的视频 URL。");return{id:sl,slug:sl,title,category:$("#cat").value,year:$("#year").value.trim(),duration:$("#duration").value.trim(),model:$("#model").value.trim(),role:$("#role").value.trim(),tags:$("#tags").value.split(/[,，]/).map(x=>x.trim()).filter(Boolean),description:$("#desc").value.trim(),making:$("#making").value.trim(),prompt:$("#prompt").value.trim(),poster:local&&pf?URL.createObjectURL(pf):pu,videoUrl:local&&vf?URL.createObjectURL(vf):vu,featured:$("#featured").checked,createdAt:new Date().toISOString()}}function render(){let list=all();$("#list").innerHTML=list.length?list.map(w=>`<article class="item"><div><h3>${esc(w.title)}</h3><p>${esc(w.category||"作品")} · ${esc(w.model||"AI Video")} ${w.featured?"· 精选":""}</p></div><button class="btn" onclick="edit('${esc(w.slug)}')">编辑</button></article>`).join(""):"<p style='color:var(--muted)'>暂无作品。</p>"}function all(){return[...(data.works||[]),...drafts].reduce((a,w)=>{if(!a.some(x=>x.slug===w.slug))a.push(w);return a},[])}window.edit=sl=>{let w=all().find(x=>x.slug===sl);if(!w)return;$("#title").value=w.title||"";$("#slug").value=w.slug||"";$("#slug").dataset.touched="1";$("#cat").value=w.category||"概念短片";$("#year").value=w.year||"";$("#duration").value=w.duration||"";$("#featured").checked=!!w.featured;$("#model").value=w.model||"";$("#role").value=w.role||"";$("#tags").value=(w.tags||[]).join(", ");$("#desc").value=w.description||"";$("#making").value=w.making||"";$("#prompt").value=w.prompt||"";$("#videoUrl").value=/^(https?:|videos\/)/.test(w.videoUrl||"")?w.videoUrl:"";$("#posterUrl").value=/^(https?:|posters\/)/.test(w.poster||"")?w.poster:"";location.hash="publish"};async function getJson(s,p){let f=await getContent(s,p);return f?JSON.parse(b64text(f.content)):null}async function putJson(s,p,obj,msg){await putFile(s,p,text64(JSON.stringify(obj,null,2)+"\n"),msg)}async function getContent(s,p){let r=await fetch(`https://api.github.com/repos/${s.owner}/${s.repo}/contents/${enc(p)}?ref=${encodeURIComponent(s.branch)}`,{headers:headers(s)});if(r.status===404)return null;if(!r.ok)throw Error(await gherr(r));return r.json()}async function putFile(s,p,content,msg){let old=await getContent(s,p),body={message:msg,content,branch:s.branch};if(old?.sha)body.sha=old.sha;await gh(s,`/repos/${s.owner}/${s.repo}/contents/${enc(p)}`,{method:"PUT",body:JSON.stringify(body)})}async function gh(s,ep,opt={}){let r=await fetch("https://api.github.com"+ep,{...opt,headers:{...headers(s),...(opt.headers||{})}});if(!r.ok)throw Error(await gherr(r));return r.status===204?null:r.json()}function headers(s){return{Accept:"application/vnd.github+json",Authorization:`Bearer ${s.token}`,"Content-Type":"application/json","X-GitHub-Api-Version":"2022-11-28"}}async function gherr(r){let j=await r.json().catch(()=>null);return j?.message||`${r.status} ${r.statusText}`}function file64(f){return new Promise((res,rej)=>{let r=new FileReader();r.onload=()=>res(String(r.result).split(",")[1]);r.onerror=()=>rej(r.error);r.readAsDataURL(f)})}function text64(t){let b=new TextEncoder().encode(t),s="";b.forEach(x=>s+=String.fromCharCode(x));return btoa(s)}function b64text(v){let bin=atob(String(v).replace(/\s/g,""));return new TextDecoder().decode(Uint8Array.from(bin,c=>c.charCodeAt(0)))}function upsert(a,w){let n=[...a],i=n.findIndex(x=>x.slug===w.slug);i>=0?n[i]={...n[i],...w}:n.unshift(w);return n}function clean(w){return{...w,poster:String(w.poster||"").startsWith("blob:")?"":w.poster,videoUrl:String(w.videoUrl||"").startsWith("blob:")?"":w.videoUrl}}function log(t){$("#log").textContent="["+new Date().toLocaleTimeString("zh-CN",{hour12:false})+"] "+t}function toast(t){$("#toast").textContent=t;$("#toast").classList.remove("hidden");setTimeout(()=>$("#toast").classList.add("hidden"),2600)}function slug(v){return String(v).normalize("NFKD").toLowerCase().replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"")||"work-"+Date.now()}function path(v){return String(v||"").replace(/\\/g,"/").replace(/^\/+|\/+$/g,"").replace(/\/{2,}/g,"/")}function enc(p){return path(p).split("/").map(encodeURIComponent).join("/")}function ext(n,f){let m=String(n).match(/\.([a-z0-9]+)$/i);return(m?m[1]:f).toLowerCase()}function esc(v){return String(v??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]))}
</script>
